<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM PRO Firebase</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    padding:12px;
}

h1{
    text-align:center;
    margin-bottom:15px;
    font-size:28px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
    background:#1e293b;
    border-radius:14px;
    padding:15px;
}

h3{
    margin-bottom:10px;
    font-size:20px;
}

h4{
    margin-top:15px;
    margin-bottom:8px;
}

input,
textarea,
button{
    width:100%;
    border:none;
    border-radius:10px;
    padding:14px;
    margin-top:8px;
    font-size:16px;
}

textarea{
    min-height:90px;
    resize:none;
}

input,
textarea{
    background:#334155;
    color:white;
}

button{
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.lista-scroll{
    max-height:350px;
    overflow-y:auto;
    margin-top:10px;
}

.cliente{
    background:#334155;
    border-radius:12px;
    padding:12px;
    margin-top:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.obs{
    background:#475569;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
}

.delete-btn{
    width:45px;
    background:#ef4444;
}

#loginScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    background:#0f172a;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:20px;
    z-index:9999;
}

.login-box{
    width:100%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:16px;
}

@media(min-width:900px){

    .container{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .full{
        grid-column:1 / -1;
    }

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<h1>CRM PRO</h1>

<input
id="emailLogin"
placeholder="Email"
>

<input
id="senhaLogin"
type="password"
placeholder="Senha"
>

<button onclick="login()">
Entrar
</button>

<button onclick="registrar()">
Criar Conta
</button>

</div>

</div>

<!-- CRM -->

<div id="crmApp" style="display:none;">

<h1>📊 CRM PRO</h1>

<div class="container">

<!-- NOVO CLIENTE -->

<div class="box">

<h3>Novo Cliente</h3>

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<input id="email" placeholder="Email">

<textarea
id="obsPrincipal"
placeholder="Observação principal"
></textarea>

<button onclick="salvarCliente()">
Salvar Cliente
</button>

<button onclick="logout()">
Sair da Conta
</button>

</div>

<!-- CLIENTES -->

<div class="box">

<h3>Clientes</h3>

<input
id="buscar"
placeholder="🔎 Buscar cliente..."
oninput="renderClientes()"
>

<button onclick="exportarExcel()">
📥 Exportar Excel
</button>

<div
id="listaClientes"
class="lista-scroll"
></div>

</div>

<!-- AGENDADOS -->

<div class="box full">

<h3>📅 Agendados</h3>

<div id="listaAgendados"></div>

</div>

<!-- DETALHES -->

<div class="box full">

<h3>Detalhes do Cliente</h3>

<div id="detalhes"></div>

<button
id="btnWhats"
style="display:none;"
onclick="abrirWhats()"
>
💬 Chamar no WhatsApp
</button>

<h4>📅 Agendar Serviço</h4>

<input
type="datetime-local"
id="dataAgendamento"
>

<button onclick="agendarServico()">
Agendar
</button>

<div id="agendaInfo"></div>

<textarea
id="novaObs"
placeholder="Nova observação"
></textarea>

<button onclick="adicionarObs()">
Adicionar Observação
</button>

<button onclick="addStatus('Fechou venda')">
💰 Fechou
</button>

<button onclick="addStatus('Não atendeu')">
📵 Não atendeu
</button>

<button onclick="addStatus('Agendado')">
⏰ Agendado
</button>

<div id="historico"></div>

</div>

</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { getAnalytics } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";


const firebaseConfig = {

    apiKey: "AIzaSyBXItibf_Ytfwgl7aZ8C65B8Fxt1LMGFYU",

    authDomain: "crmm-m.firebaseapp.com",

    databaseURL: "https://crmm-m-default-rtdb.firebaseio.com",

    projectId: "crmm-m",

    storageBucket: "crmm-m.firebasestorage.app",

    messagingSenderId: "1042579492735",

    appId: "1:1042579492735:web:439920899b3ced170e544a",

    measurementId: "G-8ZBDND5GDQ"

};

const app = initializeApp(firebaseConfig);

getAnalytics(app);

const auth = getAuth(app);

const db = getFirestore(app);


/* LOGIN */

window.registrar = async function(){

    const email =
    document.getElementById("emailLogin").value;

    const senha =
    document.getElementById("senhaLogin").value;

    try{

        await createUserWithEmailAndPassword(
            auth,
            email,
            senha
        );

        alert("Conta criada");

    }catch(err){

        alert(err.message);

    }

}


window.login = async function(){

    const email =
    document.getElementById("emailLogin").value;

    const senha =
    document.getElementById("senhaLogin").value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            senha
        );

    }catch(err){

        alert(err.message);

    }

}


window.logout = async function(){

    await signOut(auth);

}


/* LOGIN CHECK */

onAuthStateChanged(auth, async user => {

    if(user){

        document.getElementById("loginScreen")
        .style.display = "none";

        document.getElementById("crmApp")
        .style.display = "block";

        await carregarClientes();

    }else{

        document.getElementById("loginScreen")
        .style.display = "flex";

        document.getElementById("crmApp")
        .style.display = "none";

    }

});


/* CRM */

let clientes = [];

let clienteAtual = null;


/* SALVAR CLIENTE */

window.salvarCliente = async function(){

    const nome =
    document.getElementById("nome")
    .value.trim();

    if(!nome){
        return alert("Digite o nome");
    }

    const cliente = {

        nome,

        telefone:
        document.getElementById("telefone").value,

        email:
        document.getElementById("email").value,

        obsPrincipal:
        document.getElementById("obsPrincipal").value,

        historico:[],

        agendamento:null,

        userId: auth.currentUser.uid

    };

    try{

        await addDoc(
            collection(db,"clientes"),
            cliente
        );

        limparCampos();

        carregarClientes();

    }catch(err){

        alert(err.message);

    }

}


/* CARREGAR CLIENTES */

async function carregarClientes(){

    clientes = [];

    const querySnapshot =
    await getDocs(
        collection(db,"clientes")
    );

    querySnapshot.forEach(docSnap => {

        const data = docSnap.data();

        if(
            data.userId === auth.currentUser.uid
        ){

            clientes.push({

                id: docSnap.id,

                ...data

            });

        }

    });

    renderClientes();

    renderAgendados();

}


/* LIMPAR */

function limparCampos(){

    document.getElementById("nome").value = "";

    document.getElementById("telefone").value = "";

    document.getElementById("email").value = "";

    document.getElementById("obsPrincipal").value = "";

}


/* RENDER CLIENTES */

window.renderClientes = function(){

    const lista =
    document.getElementById("listaClientes");

    lista.innerHTML = "";

    const termo =
    document.getElementById("buscar")
    .value.toLowerCase();

    clientes

    .filter(c =>
        c.nome.toLowerCase().includes(termo)
    )

    .forEach(c=>{

        const div =
        document.createElement("div");

        div.className = "cliente";

        div.innerHTML = `

        <span onclick="selecionarCliente('${c.id}')">

        <b>${c.nome}</b><br>

        <small>${c.telefone || ""}</small>

        </span>

        <button
        class="delete-btn"
        onclick="deletarCliente('${c.id}')"
        >

        🗑️

        </button>

        `;

        lista.appendChild(div);

    });

}


/* AGENDADOS */

window.renderAgendados = function(){

    const div =
    document.getElementById("listaAgendados");

    div.innerHTML = "";

    clientes

    .filter(c => c.agendamento)

    .forEach(c=>{

        div.innerHTML += `

        <div
        class="cliente"
        onclick="selecionarCliente('${c.id}')"
        >

        <span>

        <b>${c.nome}</b><br>

        <small>

        📅
        ${new Date(c.agendamento)
        .toLocaleString()}

        </small>

        </span>

        </div>

        `;

    });

}


/* SELECIONAR */

window.selecionarCliente = function(id){

    clienteAtual =
    clientes.find(c => c.id === id);

    if(!clienteAtual) return;

    document.getElementById("detalhes")
    .innerHTML = `

    <div class="obs">

    <b>${clienteAtual.nome}</b><br><br>

    📞 ${clienteAtual.telefone || ""}<br>

    ✉️ ${clienteAtual.email || ""}<br><br>

    📝 ${clienteAtual.obsPrincipal || ""}

    </div>

    `;

    document.getElementById("btnWhats")
    .style.display = "block";

    renderHistorico();

    renderAgenda();

}


/* DELETAR */

window.deletarCliente = async function(id){

    try{

        await deleteDoc(
            doc(db,"clientes",id)
        );

        carregarClientes();

    }catch(err){

        alert(err.message);

    }

}


/* WHATS */

window.abrirWhats = function(){

    let numero =
    clienteAtual.telefone.replace(/\D/g,"");

    if(!numero.startsWith("55")){
        numero = "55" + numero;
    }

    window.open(
        `https://wa.me/${numero}`,
        "_blank"
    );

}


/* AGENDAR */

window.agendarServico = async function(){

    if(!clienteAtual){

        return alert("Selecione cliente");

    }

    const data =
    document.getElementById("dataAgendamento")
    .value;

    try{

        await updateDoc(

            doc(db,"clientes",clienteAtual.id),

            {

                agendamento:data

            }

        );

        clienteAtual.agendamento = data;

        renderAgenda();

        renderAgendados();

    }catch(err){

        alert(err.message);

    }

}


/* AGENDA */

window.renderAgenda = function(){

    const div =
    document.getElementById("agendaInfo");

    if(!clienteAtual?.agendamento){

        div.innerHTML = "";

        return;

    }

    div.innerHTML = `

    <div class="obs">

    📅
    ${new Date(clienteAtual.agendamento)
    .toLocaleString()}

    </div>

    `;

}


/* HISTORICO */

window.adicionarObs = function(){

    const txt =
    document.getElementById("novaObs")
    .value;

    salvarHistorico(txt);

}


window.addStatus = function(s){

    salvarHistorico(
        "STATUS: " + s
    );

}


window.salvarHistorico = async function(t){

    if(!clienteAtual) return;

    if(!clienteAtual.historico){

        clienteAtual.historico = [];

    }

    clienteAtual.historico.push({

        texto:t,

        data:new Date().toLocaleString()

    });

    try{

        await updateDoc(

            doc(db,"clientes",clienteAtual.id),

            {

                historico:
                clienteAtual.historico

            }

        );

        renderHistorico();

    }catch(err){

        alert(err.message);

    }

}


window.renderHistorico = function(){

    const div =
    document.getElementById("historico");

    div.innerHTML = "<h4>Histórico</h4>";

    if(!clienteAtual) return;

    clienteAtual.historico
    .slice()
    .reverse()

    .forEach(h=>{

        div.innerHTML += `

        <div class="obs">

        <b>${h.data}</b><br>

        ${h.texto}

        </div>

        `;

    });

}


/* EXPORTAR */

window.exportarExcel = function(){

    const dados = clientes.map(c=>({

        Nome:c.nome,

        Telefone:c.telefone,

        Email:c.email

    }));

    const ws =
    XLSX.utils.json_to_sheet(dados);

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Clientes"
    );

    XLSX.writeFile(
        wb,
        "clientes.xlsx"
    );

}

</script>

</body>
</html>
