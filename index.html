<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM PRO HYBRID</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    padding:12px;
}

h1{
    text-align:center;
    margin-bottom:15px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.box{
    background:#1e293b;
    border-radius:14px;
    padding:15px;
}

input,
textarea,
button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

input,
textarea{
    background:#334155;
    color:white;
}

button{
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

textarea{
    min-height:90px;
    resize:none;
}

.lista-scroll{
    max-height:350px;
    overflow-y:auto;
    margin-top:10px;
}

.cliente{
    background:#334155;
    border-radius:10px;
    padding:12px;
    margin-top:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.obs{
    background:#475569;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.delete-btn{
    width:45px;
    background:#ef4444;
}

#loginScreen{
    position:fixed;
    inset:0;

    background:#0f172a;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
    z-index:999;
}

.login-box{
    width:100%;
    max-width:400px;

    background:#1e293b;

    padding:25px;

    border-radius:16px;
}

.loading{
    text-align:center;
    margin-top:10px;
    color:#cbd5e1;
}

@media(min-width:900px){

    .container{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .full{
        grid-column:1 / -1;
    }

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<div class="login-box">

<h1>CRM PRO</h1>

<input
id="emailLogin"
placeholder="Email"
>

<input
id="senhaLogin"
type="password"
placeholder="Senha"
>

<button onclick="login()">
Entrar
</button>

<button onclick="registrar()">
Criar Conta
</button>

</div>

</div>

<!-- CRM -->

<div id="crmApp" style="display:none;">

<h1>📊 CRM PRO</h1>

<div class="container">

<!-- NOVO CLIENTE -->

<div class="box">

<h3>Novo Cliente</h3>

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<input id="email" placeholder="Email">

<textarea
id="obsPrincipal"
placeholder="Observação principal"
></textarea>

<button onclick="salvarCliente()">
Salvar Cliente
</button>

<button onclick="logout()">
Sair da Conta
</button>

<div
id="loading"
class="loading"
></div>

</div>

<!-- CLIENTES -->

<div class="box">

<h3>Clientes</h3>

<input
id="buscar"
placeholder="🔎 Buscar cliente..."
oninput="renderClientes()"
>

<button onclick="exportarExcel()">
📥 Exportar Excel
</button>

<button onclick="document.getElementById('inputImport').click()">
📤 Importar Excel
</button>

<input
type="file"
id="inputImport"
accept=".xlsx,.xls"
style="display:none"
onchange="importarExcel(event)"
>

<div
id="listaClientes"
class="lista-scroll"
></div>

</div>

<!-- AGENDADOS -->

<div class="box full">

<h3>📅 Agendados</h3>

<div id="listaAgendados"></div>

</div>

<!-- DETALHES -->

<div class="box full">

<h3>Detalhes do Cliente</h3>

<div id="detalhes"></div>

<button
id="btnWhats"
style="display:none;"
onclick="abrirWhats()"
>
💬 Chamar no WhatsApp
</button>

<h4>📅 Agendar Serviço</h4>

<input
type="datetime-local"
id="dataAgendamento"
>

<button onclick="agendarServico()">
Agendar
</button>

<div id="agendaInfo"></div>

<textarea
id="novaObs"
placeholder="Nova observação"
></textarea>

<button onclick="adicionarObs()">
Adicionar Observação
</button>

<button onclick="addStatus('Fechou venda')">
💰 Fechou
</button>

<button onclick="addStatus('Não atendeu')">
📵 Não atendeu
</button>

<button onclick="addStatus('Agendado')">
⏰ Agendado
</button>

<div id="historico"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    updateDoc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "SUA_KEY",

    authDomain: "SEU_AUTH",

    projectId: "SEU_PROJECT",

    storageBucket: "SEU_BUCKET",

    messagingSenderId: "SEU_MSG",

    appId: "SEU_APP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let clientes = [];

let clienteAtual = null;


/* LOCAL CACHE */

function salvarCache(){

    localStorage.setItem(
        "clientes_cache",
        JSON.stringify(clientes)
    );

}

function carregarCache(){

    try{

        const raw =
        localStorage.getItem(
            "clientes_cache"
        );

        clientes = raw
        ? JSON.parse(raw)
        : [];

    }catch{

        clientes = [];

    }

}


/* LOGIN */

window.registrar = async function(){

    try{

        await createUserWithEmailAndPassword(

            auth,

            document.getElementById("emailLogin").value,

            document.getElementById("senhaLogin").value

        );

        alert("Conta criada");

    }catch(err){

        alert(err.message);

    }

}

window.login = async function(){

    try{

        await signInWithEmailAndPassword(

            auth,

            document.getElementById("emailLogin").value,

            document.getElementById("senhaLogin").value

        );

    }catch(err){

        alert(err.message);

    }

}

window.logout = async function(){

    await signOut(auth);

}


/* AUTH */

onAuthStateChanged(auth, async user => {

    if(user){

        document.getElementById("loginScreen")
        .style.display = "none";

        document.getElementById("crmApp")
        .style.display = "block";

        carregarCache();

        renderClientes();

        renderAgendados();

        sincronizarFirebase();

    }else{

        document.getElementById("loginScreen")
        .style.display = "flex";

        document.getElementById("crmApp")
        .style.display = "none";

    }

});


/* SINCRONIZAR */

async function sincronizarFirebase(){

    mostrarLoading("Sincronizando...");

    try{

        const snapshot =
        await getDocs(
            collection(db,"clientes")
        );

        clientes = [];

        snapshot.forEach(docSnap=>{

            const data = docSnap.data();

            if(
                data.userId ===
                auth.currentUser.uid
            ){

                clientes.push({

                    id:docSnap.id,

                    ...data

                });

            }

        });

        salvarCache();

        renderClientes();

        renderAgendados();

    }catch(err){

        console.log(err);

    }

    esconderLoading();

}


/* LOADING */

function mostrarLoading(txt){

    document.getElementById("loading")
    .innerText = txt;

}

function esconderLoading(){

    document.getElementById("loading")
    .innerText = "";

}


/* SALVAR CLIENTE */

window.salvarCliente = async function(){

    const nome =
    document.getElementById("nome")
    .value.trim();

    if(!nome){

        return alert("Digite nome");

    }

    const cliente = {

        id:Date.now(),

        nome,

        telefone:
        document.getElementById("telefone").value,

        email:
        document.getElementById("email").value,

        obsPrincipal:
        document.getElementById("obsPrincipal").value,

        historico:[],

        agendamento:null

    };

    clientes.unshift(cliente);

    salvarCache();

    renderClientes();

    limparCampos();

    try{

        await addDoc(

            collection(db,"clientes"),

            {

                ...cliente,

                userId:
                auth.currentUser.uid

            }

        );

    }catch(err){

        console.log(err);

    }

}


/* LIMPAR */

function limparCampos(){

    document.getElementById("nome").value="";

    document.getElementById("telefone").value="";

    document.getElementById("email").value="";

    document.getElementById("obsPrincipal").value="";

}


/* RENDER */

window.renderClientes = function(){

    const lista =
    document.getElementById("listaClientes");

    lista.innerHTML = "";

    const termo =
    document.getElementById("buscar")
    .value.toLowerCase();

    clientes

    .filter(c=>
        c.nome.toLowerCase().includes(termo)
    )

    .forEach(c=>{

        lista.innerHTML += `

        <div class="cliente">

            <span
            onclick="selecionarCliente('${c.id}')"
            >

            <b>${c.nome}</b><br>

            <small>
            ${c.telefone || ""}
            </small>

            </span>

            <button
            class="delete-btn"
            onclick="deletarCliente('${c.id}')"
            >
            🗑️
            </button>

        </div>

        `;

    });

}


/* AGENDADOS */

window.renderAgendados = function(){

    const div =
    document.getElementById("listaAgendados");

    div.innerHTML = "";

    clientes

    .filter(c=>c.agendamento)

    .forEach(c=>{

        div.innerHTML += `

        <div
        class="cliente"
        onclick="selecionarCliente('${c.id}')"
        >

        <span>

        <b>${c.nome}</b><br>

        <small>

        📅
        ${new Date(c.agendamento)
        .toLocaleString()}

        </small>

        </span>

        </div>

        `;

    });

}


/* SELECIONAR */

window.selecionarCliente = function(id){

    clienteAtual =
    clientes.find(c=>String(c.id)===String(id));

    if(!clienteAtual) return;

    document.getElementById("detalhes")
    .innerHTML = `

    <div class="obs">

    <b>${clienteAtual.nome}</b><br><br>

    📞 ${clienteAtual.telefone || ""}<br>

    ✉️ ${clienteAtual.email || ""}<br><br>

    📝 ${clienteAtual.obsPrincipal || ""}

    </div>

    `;

    document.getElementById("btnWhats")
    .style.display = "block";

    renderHistorico();

    renderAgenda();

}


/* DELETE */

window.deletarCliente = async function(id){

    clientes =
    clientes.filter(
        c=>String(c.id)!==String(id)
    );

    salvarCache();

    renderClientes();

}


/* WHATS */

window.abrirWhats = function(){

    let numero =
    clienteAtual.telefone
    .replace(/\D/g,"");

    if(!numero.startsWith("55")){

        numero = "55" + numero;

    }

    window.open(
        `https://wa.me/${numero}`,
        "_blank"
    );

}


/* AGENDAR */

window.agendarServico = function(){

    if(!clienteAtual){

        return alert("Selecione cliente");

    }

    clienteAtual.agendamento =
    document.getElementById(
        "dataAgendamento"
    ).value;

    salvarCache();

    renderAgenda();

    renderAgendados();

}


/* AGENDA */

window.renderAgenda = function(){

    const div =
    document.getElementById("agendaInfo");

    if(!clienteAtual?.agendamento){

        div.innerHTML="";

        return;

    }

    div.innerHTML = `

    <div class="obs">

    📅
    ${new Date(clienteAtual.agendamento)
    .toLocaleString()}

    </div>

    `;

}


/* HISTORICO */

window.adicionarObs = function(){

    salvarHistorico(

        document.getElementById("novaObs")
        .value

    );

}

window.addStatus = function(s){

    salvarHistorico("STATUS: " + s);

}

window.salvarHistorico = function(t){

    if(!clienteAtual) return;

    clienteAtual.historico.push({

        texto:t,

        data:new Date().toLocaleString()

    });

    salvarCache();

    renderHistorico();

}

window.renderHistorico = function(){

    const div =
    document.getElementById("historico");

    div.innerHTML="<h4>Histórico</h4>";

    if(!clienteAtual) return;

    clienteAtual.historico
    .slice()
    .reverse()

    .forEach(h=>{

        div.innerHTML += `

        <div class="obs">

        <b>${h.data}</b><br>

        ${h.texto}

        </div>

        `;

    });

}


/* EXPORTAR */

window.exportarExcel = function(){

    const dados = clientes.map(c=>({

        Nome:c.nome,

        Telefone:c.telefone,

        Email:c.email

    }));

    const ws =
    XLSX.utils.json_to_sheet(dados);

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Clientes"
    );

    XLSX.writeFile(
        wb,
        "clientes.xlsx"
    );

}


/* IMPORTAR */

window.importarExcel = function(event){

    const file =
    event.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = e => {

        const wb = XLSX.read(

            new Uint8Array(e.target.result),

            {type:"array"}

        );

        const json =
        XLSX.utils.sheet_to_json(

            wb.Sheets[wb.SheetNames[0]]

        );

        json.forEach(item=>{

            clientes.unshift({

                id:Date.now()+Math.random(),

                nome:
                item.Nome ||
                item.nome ||
                "",

                telefone:
                item.Telefone ||
                item.telefone ||
                "",

                email:
                item.Email ||
                item.email ||
                "",

                obsPrincipal:"",

                historico:[],

                agendamento:null

            });

        });

        salvarCache();

        renderClientes();

        alert("Importado");

    };

    reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
